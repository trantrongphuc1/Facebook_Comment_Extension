<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSSQL Comment Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">MSSQL Comment Assistant</p>
        <h1>Quản lý comment, ảnh, và queue URL post</h1>
        <p class="subcopy">Lưu template trong SQL Server, gắn ảnh trực tiếp vào template, rồi tạo job theo URL post.</p>
      </div>
      <div class="status-card">
        <span class="dot" id="healthDot"></span>
        <span id="healthText">Đang kiểm tra server...</span>
      </div>
    </header>

    <section class="grid">
      <article class="panel">
        <div class="panel-head">
          <h2>Template</h2>
          <button id="resetTemplateBtn" type="button" class="ghost">Mới</button>
        </div>

        <form id="templateForm" class="form">
          <input type="hidden" id="templateId">
          <label>
            <span>Tiêu đề</span>
            <input id="templateTitle" type="text" placeholder="VD: Căn hộ 2tr8 Aeon Tân Phú" required>
          </label>
          <label>
            <span>Nội dung comment</span>
            <textarea id="templateBody" rows="5" placeholder="Mỗi dòng là một ý / một đoạn" required></textarea>
          </label>
          <div class="two-col">
            <label>
              <span>Link post mặc định</span>
              <input id="templateUrl" type="text" placeholder="https://www.facebook.com/...">
            </label>
            <label>
              <span>Ghi chú</span>
              <input id="templateNotes" type="text" placeholder="Ghi chú nội bộ">
            </label>
          </div>
          <label class="file-field">
            <span>Ảnh template</span>
            <input id="templateImages" type="file" accept="image/*" multiple>
          </label>
          <div id="templatePreview" class="preview"></div>
          <div class="actions">
            <button id="saveTemplateBtn" type="submit">Lưu template</button>
            <button id="clearTemplateImagesBtn" type="button" class="secondary">Bỏ ảnh mới chọn</button>
          </div>
        </form>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>Queue theo URL</h2>
        </div>

        <form id="jobForm" class="form">
          <label>
            <span>Chọn template</span>
            <select id="jobTemplateSelect" required></select>
          </label>
          <label>
            <span>Danh sách URL post</span>
            <textarea id="jobUrls" rows="5" placeholder="Mỗi dòng 1 URL"></textarea>
          </label>
          <label>
            <span>Lên lịch lúc (tuỳ chọn)</span>
            <input id="jobSchedule" type="datetime-local">
          </label>
          <div class="actions">
            <button type="submit">Tạo job</button>
          </div>
        </form>
      </article>
    </section>

    <section class="grid single">
      <article class="panel">
        <div class="panel-head">
          <h2>Danh sách template</h2>
          <button id="reloadBtn" type="button" class="ghost">Tải lại</button>
        </div>
        <div id="templateList" class="list"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>Job queue</h2>
        </div>
        <div id="jobList" class="list"></div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
